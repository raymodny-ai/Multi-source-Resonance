# =============================================================================
# 多源共振监控系统 - Nginx 反向代理配置
# =============================================================================
# 部署路径: /etc/nginx/conf.d/multi-resonance.conf (Linux)
#           deploy/nginx.conf → Docker 挂载到 /etc/nginx/conf.d/default.conf
# =============================================================================

# 速率限制: 每个 IP 每秒最多 30 请求, 突发 10
limit_req_zone $binary_remote_addr zone=resonance_limit:10m rate=30r/s;

# WebSocket 连接升级映射
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream resonance_backend {
    server app:8524;                # Docker 内部服务名
    # server 127.0.0.1:8524;       # 裸机部署
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 日志
    access_log /var/log/nginx/resonance-access.log;
    error_log  /var/log/nginx/resonance-error.log;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 客户端上传限制
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # 超时配置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── 健康检查 ──
    location /api/health {
        limit_req zone=resonance_limit burst=10 nodelay;
        proxy_pass http://resonance_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── WebSocket ──
    location /ws {
        proxy_pass http://resonance_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;   # WebSocket 长连接 24h
        proxy_send_timeout 86400s;
    }

    # ── SSE 流 ──
    location /api/stream/ {
        proxy_pass http://resonance_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ── API ──
    location /api/ {
        limit_req zone=resonance_limit burst=20 nodelay;
        proxy_pass http://resonance_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 前端静态资源 (缓存 7 天) ──
    location /assets/ {
        proxy_pass http://resonance_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Favicon ──
    location = /favicon.svg {
        proxy_pass http://resonance_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA Fallback ──
    location / {
        proxy_pass http://resonance_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

